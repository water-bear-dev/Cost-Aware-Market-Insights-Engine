services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./static:/app/static
      - ./scratch:/app/scratch
    env_file:
      - .env
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      - dynamodb-local
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ."
    volumes:
      - dynamodb-data:/home/dynamodblocal
    ports:
      - "8001:8000"

  vibe-trading-mcp:
    build: .
    command: vibe-trading-mcp
    environment:
      - FASTMCP_TRANSPORT=sse
      - FASTMCP_PORT=8010
      - FASTMCP_HOST=0.0.0.0
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - LLM_PROVIDER=mock
    ports:
      - "8010:8010"
    volumes:
      - ./scratch:/app/scratch

volumes:
  dynamodb-data:
